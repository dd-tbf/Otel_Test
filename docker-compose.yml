services:
  # OpenTelemetry Collector
  otel-collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: otel-collector
    hostname: otel-collector
    restart: unless-stopped
    environment:
      # Datadog configuration
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_ENV=${DD_ENV:-development}
      - DD_VERSION=${DD_VERSION:-1.0.0}
      - DD_HOSTNAME=${DD_HOSTNAME:-otel-simple-collector}
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Collector metrics endpoint
      - "13133:13133" # Health check endpoint
    volumes:
      - ./collector/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - metrics-network

  # Python Application
  python-server:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: python-server
    hostname: python-server
    restart: unless-stopped
    environment:
      # Application configuration
      - SERVICE_NAME=${SERVICE_NAME:-simple-python-server}
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - ENVIRONMENT=${DD_ENV:-development}
      # OpenTelemetry configuration
      - OTEL_COLLECTOR_ENDPOINT=http://otel-collector:4317
    ports:
      - "5000:5000"
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - metrics-network

  # Load generator for testing (optional)
  load-generator:
    image: curlimages/curl:8.4.0
    container_name: load-generator
    depends_on:
      python-server:
        condition: service_healthy
    command: >
      sh -c "
      echo '🚀 Starting load generation in 30 seconds...';
      sleep 30;
      echo '📊 Generating metrics load...';
      while true; do
        # Make requests to different endpoints
        curl -s http://python-server:5000/ > /dev/null;
        curl -s http://python-server:5000/health > /dev/null;
        curl -s http://python-server:5000/load-test > /dev/null;
        curl -s http://python-server:5000/generate-metrics > /dev/null;
        
        # Vary the request rate
        sleep $$(shuf -i 1-3 -n 1);
      done
      "
    networks:
      - metrics-network
    profiles:
      - load-test

networks:
  metrics-network:
    driver: bridge
    name: otel-metrics-network