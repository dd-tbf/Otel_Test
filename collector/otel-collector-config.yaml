# OpenTelemetry Collector Configuration
# Complete configuration for metrics, traces, and logs forwarding to Datadog

receivers:
  # OTLP receiver for receiving metrics, traces, and logs from the Python app
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Host metrics receiver for system-level metrics
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      filesystem:
        metrics:
          system.filesystem.utilization:
            enabled: true

  # Filelog receiver to collect logs from shared volume
  filelog:
    include:
      - /var/log/app/*.log
    start_at: beginning
    include_file_name: true
    include_file_path: true
    operators:
      # Parse Python structured log format
      - type: regex_parser
        regex: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) (?P<level>\w+) \[(?P<logger>[^\]]+)\] \[(?P<file>[^\]]+)\] \[trace_id=(?P<trace_id>[a-f0-9]+) span_id=(?P<span_id>[a-f0-9]+) resource\.service\.name=(?P<service>[^\s]+)[^\]]*\] - (?P<message>.*)'
        timestamp:
          parse_from: attributes.timestamp
          layout: '%Y-%m-%d %H:%M:%S,%L'
      
      # Set severity from log level
      - type: severity_parser
        parse_from: attributes.level
        preset: default
      
      # Add resource attributes
      - type: add
        field: resource["service.name"]
        value: EXPR(attributes.service)
        if: 'attributes.service != nil'
      
      # Add trace context attributes
      - type: trace_parser
        trace_id:
          parse_from: attributes.trace_id
        span_id:
          parse_from: attributes.span_id
        if: 'attributes.trace_id != nil and attributes.trace_id != "0"'

processors:
  # Batch processor for efficient export
  batch:
    timeout: 10s
    send_batch_size: 512
    send_batch_max_size: 1024

  # Resource processor to add/modify resource attributes
  resource:
    attributes:
      - key: deployment.environment
        value: "${env:DD_ENV}"
        action: upsert
      - key: service.version
        value: "${env:DD_VERSION}"
        action: upsert
      - key: env
        value: "${env:DD_ENV}"
        action: upsert
      - key: version
        value: "${env:DD_VERSION}"
        action: upsert

  # Memory limiter to prevent OOM issues
  memory_limiter:
    limit_mib: 256
    spike_limit_mib: 64
    check_interval: 1s

exporters:
  # Datadog exporter for metrics, traces, and logs
  datadog:
    api:
      key: "${env:DD_API_KEY}"
      site: "${env:DD_SITE}"
    
    # Hostname configuration
    hostname: "${env:DD_HOSTNAME}"
    
    # Metrics configuration
    metrics:
      # Delta temporality for counters (recommended for Datadog)
      delta_ttl: 3600
      histograms:
        mode: distributions
        send_aggregation_metrics: true
    
    # Traces configuration
    traces:
      # Enable trace metrics for APM
      compute_stats_by_span_kind: true
      compute_top_level_by_span_kind: true
      # Enable peer tags for service dependencies
      peer_tags_aggregation: true
      # Trace sampling (100% for demo)
      trace_buffer: 500
    
    # Logs configuration
    logs:
      # Enable logs forwarding
      # Logs will be correlated with traces automatically

  # Debug exporter for troubleshooting
  debug:
    verbosity: detailed
    sampling_initial: 2
    sampling_thereafter: 10

  # Logging exporter for console output
  logging:
    loglevel: info

connectors:
  # Datadog connector to generate APM metrics from traces
  datadog/connector:
    # This connector generates trace metrics like:
    # - trace.flask.request.hits (request count)
    # - trace.flask.request.duration (latency)
    # - trace.flask.request.errors (error count)
    # These complement your custom metrics and power Datadog APM dashboards

service:
  # Extensions
  extensions: [health_check]
  
  # Telemetry configuration for collector's own metrics
  telemetry:
    logs:
      level: "info"
      encoding: "json"
    metrics:
      level: detailed
      address: 0.0.0.0:8888

  pipelines:
    # Traces pipeline - generates traces AND APM metrics via connector
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [datadog, datadog/connector, debug, logging]  # Connector added!
    
    # Metrics pipeline - receives custom metrics + APM metrics from connector
    metrics:
      receivers: [otlp, hostmetrics, datadog/connector]  # Connector added!
      processors: [memory_limiter, resource, batch]
      exporters: [datadog, debug, logging]
    
    # Logs pipeline - collects from file logs and OTLP
    logs:
      receivers: [filelog, otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [datadog, debug, logging]

extensions:
  # Health check extension
  health_check:
    endpoint: 0.0.0.0:13133
    path: "/health"
